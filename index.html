<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Constelación del Armario</title>

<style>
body{
background:black;
color:white;
font-family:sans-serif;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
max-width:700px;
margin:auto;
margin-top:80px;
}

img{
width:100%;
cursor:pointer;
border-radius:8px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
}
</style>

</head>

<body>

<h1>Constelación del Armario</h1>

<div class="grid">

<img id="img1" onclick="randomImage('elvira','img1')">
<img id="img2" onclick="randomImage('Ana','img2')">

<img id="img3" onclick="randomImage('rodrigo','img3')">
<img id="img4" onclick="randomImage('alba','img4')">

</div>

<button onclick="generate()">nueva constelación</button>

<script>

const images={
elvira:["1.jpg","2.jpg","3.jpg"],
Ana:["1.jpg","2.jpg"],
rodrigo:["1.jpg","2.jpg"],
alba:["1.jpg","2.jpg"]
}

function randomImage(folder,id){
let arr=images[folder]
let img=arr[Math.floor(Math.random()*arr.length)]
document.getElementById(id).src=folder+"/"+img
}

function generate(){
randomImage("elvira","img1")
randomImage("Ana","img2")
randomImage("rodrigo","img3")
randomImage("alba","img4")
}

generate()

</script>

</body>
</html>
